<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyberpunk Тетрис</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>
  <main class="app">
    <section class="game-panel">
      <div class="panel-header">
        <div>
          <h1>CYBERPUNK Тетрис</h1>
        </div>
        <div class="status" id="status">ONLINE</div>
      </div>

      <div class="canvas-wrap">
        <canvas id="game" width="300" height="600"></canvas>
        <div class="scanlines"></div>
      </div>
    </section>

    <aside class="sidebar">
      <section class="card">
        <h2>Отчет</h2>
        <div class="stat-row"><span>Счет</span><strong id="score">0</strong></div>
        <div class="stat-row"><span>Линии</span><strong id="lines">0</strong></div>
        <div class="stat-row"><span>Уровень</span><strong id="level">1</strong></div>
        <div class="stat-row"><span>Лучший результат</span><strong id="best">0</strong></div>
      </section>

      <section class="card">
        <h2>Следующая фигура</h2>
        <div class="next-piece-wrap">
          <canvas id="nextPiece" width="120" height="120"></canvas>
        </div>
      </section>

      <section class="card">
        <h2>Управление</h2>
        <div class="controls">
          <div><kbd>←</kbd><kbd>→</kbd> перемещение</div>
          <div><kbd>↑</kbd> вращать</div>
          <div><kbd>↓</kbd> слегка опустить</div>
          <div><kbd>Space</kbd> опустить полностью</div>
          <div><kbd>P</kbd> пауза</div>
        </div>
      </section>

      <section class="card">
        <h2>Действия</h2>
        <div class="actions">
          <button id="restartBtn" class="btn btn-primary">Перезапустить</button>
          <button id="pauseBtn" class="btn btn-secondary">Пауза</button>
          <button id="clearBestBtn" class="btn btn-danger">Сбросить лучший результат</button>
        </div>
      </section>

      <section class="card note">
        <p>
          Небольшой эксперимент для портфолио: ванильный HTML/CSS/JS,
          но с более выразительным визуалом.
        </p>
      </section>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
